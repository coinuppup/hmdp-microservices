server:
  port: "8082"

mysql:
  host: "127.0.0.1"
  port: "3307"
  user: "root"
  password: "001020"
  dbname: "hmdp"

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0

grpc:
  port: "50052"

kafka:
  brokers:
    - "localhost:9092"
  topic: "order-create"

# 缓存失效相关配置
cache:
  invalidate-topic: "cache-invalidate"  # 缓存失效消息主题
  binlog-topic: "db-binlog"              # 数据库binlog消息主题
  enable-local-cache: true               # 启用本地缓存
  local-cache-size: 10000                # 本地缓存大小
  local-cache-ttl: 5m                    # 本地缓存TTL

etcd:
  endpoints:
    - "localhost:2379"
  service:
    host: "127.0.0.1"
    name: "shop-service"
    ttl: 10

# Canal配置
canal:
  server: "127.0.0.1:11111"        # Canal服务端地址
  destination: "example"             # Canal实例名
  username: "canal"                # Canal用户名
  password: "canal"                # Canal密码
  filter: "hmdp\\..*"              # 过滤规则：监听hmdp数据库所有表
  batch-size: 1000                 # 批量获取大小
  timeout: 60                     # 超时时间(秒)
  enabled: true                    # 是否启用Canal
