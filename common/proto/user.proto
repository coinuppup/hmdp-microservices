syntax = "proto3";

package user;

option go_package = "hmdp-microservices/common/proto";

// 用户服务接口
service UserService {
  // 用户登录
  rpc Login(LoginRequest) returns (LoginResponse);
  // 获取用户信息
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
  // 用户签到
  rpc Sign(SignRequest) returns (SignResponse);
  // 获取签到次数
  rpc GetSignCount(GetSignCountRequest) returns (GetSignCountResponse);
}

// 登录请求
message LoginRequest {
  string phone = 1;
  string code = 2;
}

// 登录响应
message LoginResponse {
  int32 code = 1;
  string message = 2;
  string token = 3;
}

// 获取用户信息请求
message GetUserInfoRequest {
  int64 userId = 1;
}

// 获取用户信息响应
message GetUserInfoResponse {
  int32 code = 1;
  string message = 2;
  UserInfo data = 3;
}

// 用户信息
message UserInfo {
  int64 id = 1;
  string phone = 2;
  string nickName = 3;
  string icon = 4;
}

// 签到请求
message SignRequest {
  int64 userId = 1;
}

// 签到响应
message SignResponse {
  int32 code = 1;
  string message = 2;
  bool data = 3;
}

// 获取签到次数请求
message GetSignCountRequest {
  int64 userId = 1;
}

// 获取签到次数响应
message GetSignCountResponse {
  int32 code = 1;
  string message = 2;
  int32 data = 3;
}