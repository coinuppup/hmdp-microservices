syntax = "proto3";

package shop;

option go_package = "hmdp-microservices/common/proto";

// 购物服务接口
service ShopService {
  // 获取商铺信息
  rpc GetShop(GetShopRequest) returns (GetShopResponse);
  // 分页查询商铺
  rpc ListShops(ListShopsRequest) returns (ListShopsResponse);
  // 获取商铺类型
  rpc ListShopTypes(ListShopTypesRequest) returns (ListShopTypesResponse);
  // 获取优惠券列表
  rpc ListVouchers(ListVouchersRequest) returns (ListVouchersResponse);
  // 秒杀优惠券
  rpc SeckillVoucher(SeckillVoucherRequest) returns (SeckillVoucherResponse);
  // 获取订单列表
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
}

// 获取商铺请求
message GetShopRequest {
  int64 id = 1;
}

// 获取商铺响应
message GetShopResponse {
  int32 code = 1;
  string message = 2;
  Shop data = 3;
}

// 商铺信息
message Shop {
  int64 id = 1;
  string name = 2;
  int64 typeId = 3;
  string area = 4;
  string address = 5;
  double longitude = 6;
  double latitude = 7;
  double avgPrice = 8;
  int32 sale = 9;
  int32 comments = 10;
  double score = 11;
  int32 status = 12;
}

// 分页查询商铺请求
message ListShopsRequest {
  int64 typeId = 1;
  int32 current = 2;
  int32 size = 3;
}

// 分页查询商铺响应
message ListShopsResponse {
  int32 code = 1;
  string message = 2;
  repeated Shop data = 3;
  int32 total = 4;
}

// 获取商铺类型请求
message ListShopTypesRequest {
}

// 获取商铺类型响应
message ListShopTypesResponse {
  int32 code = 1;
  string message = 2;
  repeated ShopType data = 3;
}

// 商铺类型
message ShopType {
  int64 id = 1;
  string name = 2;
  string icon = 3;
  int32 sort = 4;
}

// 获取优惠券列表请求
message ListVouchersRequest {
  int64 shopId = 1;
}

// 获取优惠券列表响应
message ListVouchersResponse {
  int32 code = 1;
  string message = 2;
  repeated Voucher data = 3;
}

// 优惠券信息
message Voucher {
  int64 id = 1;
  int64 shopId = 2;
  string title = 3;
  string subTitle = 4;
  string rules = 5;
  double payValue = 6;
  double actualValue = 7;
  int32 type = 8;
  int32 status = 9;
  int32 stock = 10;
  int64 beginTime = 11;
  int64 endTime = 12;
}

// 秒杀优惠券请求
message SeckillVoucherRequest {
  int64 voucherId = 1;
  int64 userId = 2;
}

// 秒杀优惠券响应
message SeckillVoucherResponse {
  int32 code = 1;
  string message = 2;
  int64 data = 3; // 订单ID
}

// 获取订单列表请求
message ListOrdersRequest {
  int64 userId = 1;
  int32 current = 2;
  int32 size = 3;
}

// 获取订单列表响应
message ListOrdersResponse {
  int32 code = 1;
  string message = 2;
  repeated Order data = 3;
  int32 total = 4;
}

// 订单信息
message Order {
  int64 id = 1;
  int64 userId = 2;
  int64 voucherId = 3;
  int32 status = 4;
  int64 createTime = 5;
  int64 updateTime = 6;
}