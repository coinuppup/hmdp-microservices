version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hmdp-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "001020"
      MYSQL_DATABASE: "hmdp"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7
    container_name: hmdp-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.12
    container_name: hmdp-etcd
    ports:
      - "2379:2379"
    volumes:
      - ./volumes/etcd:/etcd-data
    command: >
      /usr/local/bin/etcd
      --data-dir=/etcd-data
      --listen-client-urls=http://0.0.0.0:2379
      --advertise-client-urls=http://localhost:2379

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hmdp-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hmdp-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1